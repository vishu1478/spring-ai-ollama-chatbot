<!DOCTYPE html>
<html>
<head>
<title>Vishwajeet's AI Chat</title>
</head>
<body>

<h2>Ask Vishwajeet's AI</h2>

<input id="q" size="50">
<button onclick="ask()">Ask</button>

<pre id="result"></pre>

<script>
function ask(){
let q=document.getElementById("q").value;

fetch("/ai/ask?question="+encodeURIComponent(q))
.then(r=>r.text())
.then(data=>{
document.getElementById("result").innerText=data;
});
}
</script>

</body>
</html>
